repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: |
          (?x)^(
            .*\.lock|
            package-lock\.json|
            pnpm-lock\.yaml|
            yarn\.lock|
            \.next/.*|
            node_modules/.*|
            \.secrets\.baseline|
            supabase/\.temp/.*
          )$
