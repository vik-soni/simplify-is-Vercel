<style>

<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- Background Canvas (Simulating the Dashboard behind the modal) -->
<div class="fixed inset-0 z-0 bg-[#141311] grid grid-cols-12 gap-6 p-8 opacity-40 blur-[2px]">
<div class="col-span-3 h-full bg-surface-container-low rounded-lg"></div>
<div class="col-span-9 flex flex-col gap-6">
<div class="h-14 bg-surface-container-high rounded-lg w-full"></div>
<div class="grid grid-cols-3 gap-6 h-40">
<div class="bg-surface-container-high rounded-lg"></div>
<div class="bg-surface-container-high rounded-lg"></div>
<div class="bg-surface-container-high rounded-lg"></div>
</div>
<div class="flex-grow bg-surface-container-high rounded-lg"></div>
</div>
</div>
<!-- MFA Backdrop Overlay -->
<div class="fixed inset-0 z-10 bg-surface-dim/80 backdrop-blur-sm flex items-center justify-center p-4">
<!-- 3D Popup Modal -->
<div class="relative w-full max-w-lg bg-[#1C1B19] rounded-xl overflow-hidden mfa-shadow depth-3d border border-outline/10">
<!-- Close Button -->
<button aria-label="Close" class="absolute top-4 right-4 text-on-secondary-container hover:text-primary transition-colors p-2">
<span class="material-symbols-outlined text-2xl" data-icon="close">close</span>
</button>
<div class="px-6 py-10 sm:p-10 flex flex-col items-center text-center">
<!-- Security Icon -->
<div class="w-14 h-14 sm:w-16 sm:h-16 bg-surface-container-highest rounded-full flex items-center justify-center mb-6 sm:mb-8 border border-outline/10 glow-brand">
<span class="material-symbols-outlined text-[#EB5E28] text-3xl sm:text-4xl" data-icon="verified_user">verified_user</span>
</div>
<!-- Typography: Raleway for Command, Josefin for Metadata -->
<h1 class="font-raleway text-2xl sm:text-3xl font-bold tracking-tight text-on-surface mb-3">Enter Verification Code</h1>
<p class="font-josefin text-secondary text-sm max-w-[280px] leading-relaxed mb-8 sm:mb-10">
                    A 6-digit code has been sent to your authenticator app.
                </p>
<!-- OTP Inputs -->
<div class="flex gap-2 sm:gap-3 mb-10 sm:mb-12">
<input autocomplete="one-time-code" class="w-10 h-14 sm:w-12 sm:h-16 bg-surface-container-lowest border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-surface-container-high transition-all rounded-t-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input autocomplete="one-time-code" class="w-10 h-14 sm:w-12 sm:h-16 bg-surface-container-lowest border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-surface-container-high transition-all rounded-t-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input autocomplete="one-time-code" class="w-10 h-14 sm:w-12 sm:h-16 bg-surface-container-lowest border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-surface-container-high transition-all rounded-t-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<div class="w-2 sm:w-4"></div> <!-- Spacer for chunking digits -->
<input autocomplete="one-time-code" class="w-10 h-14 sm:w-12 sm:h-16 bg-surface-container-lowest border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-surface-container-high transition-all rounded-t-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input autocomplete="one-time-code" class="w-10 h-14 sm:w-12 sm:h-16 bg-surface-container-lowest border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-surface-container-high transition-all rounded-t-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input autocomplete="one-time-code" class="w-10 h-14 sm:w-12 sm:h-16 bg-surface-container-lowest border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-surface-container-high transition-all rounded-t-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-gradient-to-r from-[#EB5E28] to-[#C44A1A] text-on-surface font-josefin font-semibold text-lg rounded-lg glow-brand hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 shadow-lg touch-manipulation">
                    Verify
                </button>
<!-- Help Link -->
<div class="mt-6">
<button class="text-secondary hover:text-on-surface font-josefin text-xs tracking-wider uppercase transition-colors p-2">
                        Resend Code
                    </button>
</div>
</div>
<!-- Footer Meta -->
<div class="bg-surface-container-lowest/50 py-5 sm:py-6 px-6 sm:px-10 border-t border-outline/5 flex justify-center gap-6 sm:gap-8">
<a class="font-josefin text-[10px] uppercase tracking-[0.2em] text-outline hover:text-secondary transition-colors" href="#">Privacy Policy</a>
<a class="font-josefin text-[10px] uppercase tracking-[0.2em] text-outline hover:text-secondary transition-colors" href="#">Terms of Service</a>
</div>
</div>
</div>

<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#EB5E28] to-transparent opacity-20 z-20"></div>
