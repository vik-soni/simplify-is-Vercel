<!-- Login Container -->
<main class="w-full max-w-md flex flex-col items-center space-y-10">
<!-- Branding Section -->
<header class="text-center space-y-6">
<div class="space-y-2">
<h1 class="font-raleway text-3xl font-black tracking-tight text-on-surface" style="">
                    Log in to Simplify IS
                </h1>
<p class="font-montserrat text-secondary text-sm font-medium tracking-wide" style="">
                    Continue your security assessment
                </p>
</div>
</header>
<!-- Form Card -->
<div class="w-full bg-surface-container-high/80 backdrop-blur-xl p-8 rounded-xl glow-brand border border-outline/10 transition-all duration-300 relative shadow-2xl shadow-black/50 border-t-white/10 border-l-white/10"><button aria-label="Close" class="absolute top-4 right-4 text-outline/40 hover:text-on-surface transition-colors p-1">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-josefin text-sm font-semibold tracking-wider text-secondary uppercase" for="email" style="">login Email
                    </label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline/20 px-0 py-3 text-on-surface placeholder:text-outline/40 focus:ring-0 focus:border-[#EB5E28] transition-all duration-300 font-montserrat" id="email" placeholder="name@organization.com" type="email"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-[#EB5E28] group-focus-within:w-full transition-all duration-500 shadow-[0_0_8px_rgba(235,94,40,0.5)]"></div>
</div>
</div>
<!-- Access Key Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-josefin text-sm font-semibold tracking-wider text-secondary uppercase" for="key" style="">password </label>
<a class="font-josefin text-xs text-[#EB5E28] hover:text-primary transition-colors" href="#" style="">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline/20 px-0 py-3 text-on-surface placeholder:text-outline/40 focus:ring-0 focus:border-[#EB5E28] transition-all duration-300 font-montserrat" id="key" placeholder="••••••••••••" type="password"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-[#EB5E28] group-focus-within:w-full transition-all duration-500 shadow-[0_0_8px_rgba(235,94,40,0.5)]"></div>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="group w-full bg-gradient-to-r from-[#EB5E28] to-[#C44A1A] text-on-primary-fixed font-raleway font-bold py-4 rounded-lg shadow-lg hover:shadow-[#EB5E28]/20 transition-all duration-300 flex items-center justify-center space-x-2 active:scale-[0.98]" style="" type="submit">
<span class="" style="">Sign in</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward" style="">
                            arrow_forward
                        </span>
</button>
</div>
<!-- Secondary Action -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline/10"></div>
<span class="flex-shrink mx-4 font-mono text-[10px] text-outline/40 uppercase tracking-widest" style="">or</span>
<div class="flex-grow border-t border-outline/10"></div>
</div>
<button class="w-full bg-transparent border border-outline/20 text-secondary hover:bg-surface-bright hover:text-on-surface py-3 rounded-lg transition-all duration-300 font-josefin font-medium text-sm flex items-center justify-center space-x-2 opacity-50 cursor-not-allowed grayscale pointer-events-none" style="" type="button"><span>SSO Enterprise Login (Coming Soon)</span></button>

</div>

<div class="flex flex-wrap justify-center gap-x-8 gap-y-4 text-[11px] font-mono uppercase tracking-[0.2em] text-[#CCC5B9]/60"><a class="hover:text-[#EB5E28] transition-colors duration-300" href="#">Privacy Policy</a>
