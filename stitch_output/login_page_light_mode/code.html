<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log in to Simplify IS | Earthy Sentinel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800;900&amp;family=Montserrat:wght@400;500;600&amp;family=Josefin+Sans:wght@400;500;600&amp;family=Geist+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#FFFCF2",
                        "on-background": "#1A1917",
                        "primary": "#EB5E28",
                        "on-primary": "#FFFFFF",
                        "surface": "#FFFCF2",
                        "on-surface": "#1A1917",
                        "surface-container-high": "#F5F2E9",
                        "surface-container-lowest": "#FFFFFF",
                        "outline": "#403D39",
                        "secondary": "#403D39",
                        "surface-bright": "#FFFCF2",
                        "primary-container": "#EB5E28"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "epilogue": ["Epilogue", "sans-serif"],
                        "montserrat": ["Montserrat", "sans-serif"],
                        "josefin": ["Josefin Sans", "sans-serif"],
                        "mono": ["Geist Mono", "monospace"]
                    }
                },
            },
        }
    </script>
<style>
        .glow-brand {
            box-shadow: 0 10px 30px rgba(235, 94, 40, 0.08);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #FFFCF2;
            color: #1A1917;
        }
    </style>
</head>
<body class="bg-background text-on-background font-epilogue min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary/20 selection:text-primary">
<!-- Login Container -->
<main class="w-full max-w-md flex flex-col items-center space-y-10">
<!-- Branding Section -->
<header class="text-center space-y-6">
<div class="space-y-2">
<h1 class="font-epilogue text-3xl font-black tracking-tight text-on-surface">
                Log in to Simplify IS
            </h1>
<p class="font-montserrat text-secondary/70 text-sm font-medium tracking-wide">
                Continue your security assessment
            </p>
</div>
</header>
<!-- Form Card -->
<div class="w-full bg-surface-container-high p-8 rounded-xl glow-brand border border-outline/10 transition-all duration-300 relative shadow-xl shadow-black/5">
<button aria-label="Close" class="absolute top-4 right-4 text-outline/40 hover:text-on-surface transition-colors p-1">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-josefin text-sm font-semibold tracking-wider text-secondary uppercase" for="email">
                    login Email
                </label>
<div class="relative group">
<input class="w-full bg-transparent border-0 border-b border-outline/20 px-0 py-3 text-on-surface placeholder:text-outline/40 focus:ring-0 focus:border-[#EB5E28] transition-all duration-300 font-montserrat" id="email" placeholder="name@organization.com" type="email"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-[#EB5E28] group-focus-within:w-full transition-all duration-500"></div>
</div>
</div>
<!-- Access Key Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-josefin text-sm font-semibold tracking-wider text-secondary uppercase" for="key">password</label>
<a class="font-josefin text-xs text-[#EB5E28] hover:text-primary transition-colors font-semibold" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full bg-transparent border-0 border-b border-outline/20 px-0 py-3 text-on-surface placeholder:text-outline/40 focus:ring-0 focus:border-[#EB5E28] transition-all duration-300 font-montserrat" id="key" placeholder="••••••••••••" type="password"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-[#EB5E28] group-focus-within:w-full transition-all duration-500"></div>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="group w-full bg-[#EB5E28] text-white font-epilogue font-bold py-4 rounded-lg shadow-lg shadow-[#EB5E28]/20 hover:shadow-[#EB5E28]/30 transition-all duration-300 flex items-center justify-center space-x-2 active:scale-[0.98]" type="submit">
<span>Sign in</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">
                        arrow_forward
                    </span>
</button>
</div>
<!-- Secondary Action -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline/10"></div>
<span class="flex-shrink mx-4 font-mono text-[10px] text-outline/40 uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline/10"></div>
</div>
<button class="w-full bg-transparent border border-outline/20 text-secondary hover:bg-surface-bright hover:text-on-surface py-3 rounded-lg transition-all duration-300 font-josefin font-medium text-sm flex items-center justify-center space-x-2 opacity-50 cursor-not-allowed pointer-events-none" type="button">
<span>SSO Enterprise Login (Coming Soon)</span>
</button>
</form>
</div>
<!-- Footer -->
<footer class="w-full pt-8 border-t border-outline/5">
<div class="flex flex-wrap justify-center gap-x-8 gap-y-4 text-[11px] font-mono uppercase tracking-[0.2em] text-secondary/60">
<a class="hover:text-[#EB5E28] transition-colors duration-300" href="#">Privacy Policy</a>
<a class="hover:text-[#EB5E28] transition-colors duration-300" href="#">Terms of Service</a>
</div>
<div class="mt-8 text-center">
<p class="font-josefin text-[10px] text-outline/30 uppercase tracking-widest">
                © 2026 simplify.is
            </p>
</div>
</footer>
</main>
<!-- Decorative Element: Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.05] mix-blend-multiply">
<img class="w-full h-full object-cover" data-alt="subtle organic paper texture with fine grain and warm tonal shifts for background depth" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6r41R3BLzfzLpoFthItgWUEMAJTooNjSYUmc2ixgEkO4TYl8KCK7WdDoI6d5OKuh3D7dTTT79X1PgopxqYOuMqmQvfGGE7K5Nd9c0xernLHnyKyi9IiOneB3wSEMKMOjW_tIb2v0HaJraCrvShcPK5ajxXc4mkHphOjvyXUaKL_CIDL8x_rWecmPtR2naDIMxwfa_4tKFElkpRiCf34t4xJJmuPWQLk0qgCVsjgCqjmEaLbJ0EhkmlJ24wJakUABw8y1Vab13RmE"/>
</div>
<!-- Decorative Subtle Glows -->
<div class="fixed -top-24 -left-24 w-96 h-96 bg-[#EB5E28]/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed -bottom-24 -right-24 w-96 h-96 bg-[#EB5E28]/5 blur-[120px] rounded-full pointer-events-none"></div>
</body></html>
