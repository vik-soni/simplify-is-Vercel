<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&amp;family=Josefin+Sans:wght@400;500;600&amp;family=Montserrat:wght@400;500&amp;family=Epilogue:wght@700&amp;family=Manrope:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@500;600&amp;family=Geist+Mono&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "on-surface": "#1A1917",
                        "secondary": "#635f59",
                        "primary-container": "#ffdbcf",
                        "on-primary": "#ffffff",
                        "on-background": "#1A1917",
                        "surface-container-highest": "#e8e2d9",
                        "secondary-container": "#e9e2d5",
                        "surface-dim": "#ded9d0",
                        "surface-tint": "#8f4e00",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#FFFCF2",
                        "surface-container": "#f3eee5",
                        "outline-variant": "#d2c5b1",
                        "inverse-surface": "#32302e",
                        "primary": "#EB5E28",
                        "surface-container-high": "#ede8df",
                        "surface-container-low": "#f9f3ea",
                        "background": "#FFFCF2",
                        "outline": "#817667",
                        "on-secondary-container": "#1e1b14",
                        "surface-variant": "#eee1cf",
                        "surface-bright": "#fff9f0",
                        "on-primary-container": "#2e1500"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Epilogue"],
                        "body": ["Manrope"],
                        "label": ["Plus Jakarta Sans"],
                        "raleway": ["Raleway"],
                        "josefin": ["Josefin Sans"],
                        "montserrat": ["Montserrat"],
                        "mono": ["Geist Mono"]
                    }
                },
            },
        }
    </script>
<style>
        .glow-brand { box-shadow: 0 0 20px rgba(235, 94, 40, 0.1); }
        .mfa-shadow { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.05); }
        .depth-3d { transform: perspective(1000px) rotateX(2deg); }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface overflow-hidden">
<!-- Background Canvas (Simulating the Dashboard behind the modal) -->
<div class="fixed inset-0 z-0 bg-background grid grid-cols-12 gap-6 p-8 opacity-40 blur-[2px]">
<div class="col-span-3 h-full bg-surface-container-low rounded-lg"></div>
<div class="col-span-9 flex flex-col gap-6">
<div class="h-14 bg-surface-container-high rounded-lg w-full"></div>
<div class="grid grid-cols-3 gap-6 h-40">
<div class="bg-surface-container-high rounded-lg"></div>
<div class="bg-surface-container-high rounded-lg"></div>
<div class="bg-surface-container-high rounded-lg"></div>
</div>
<div class="flex-grow bg-surface-container-high rounded-lg"></div>
</div>
</div>
<!-- MFA Backdrop Overlay -->
<div class="fixed inset-0 z-10 bg-black/5 backdrop-blur-sm flex items-center justify-center p-4">
<!-- 3D Popup Modal -->
<div class="relative w-full max-w-lg bg-surface-container-lowest rounded-xl overflow-hidden mfa-shadow depth-3d border border-outline/5">
<!-- Close Button -->
<button aria-label="Close" class="absolute top-6 right-6 text-outline hover:text-primary transition-colors p-1">
<span class="material-symbols-outlined text-2xl" data-icon="close">close</span>
</button>
<div class="p-10 flex flex-col items-center text-center">
<!-- Security Icon -->
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mb-8 border border-outline/5 glow-brand">
<span class="material-symbols-outlined text-[#EB5E28] text-4xl" data-icon="verified_user">verified_user</span>
</div>
<!-- Typography: Raleway for Command, Josefin for Metadata -->
<h1 class="font-raleway text-3xl font-bold tracking-tight text-on-surface mb-3">Enter Verification Code</h1>
<p class="font-josefin text-secondary text-sm max-w-[280px] leading-relaxed mb-10">
                    A 6-digit code has been sent to your authenticator app.
                </p>
<!-- OTP Inputs -->
<div class="flex gap-3 mb-12">
<input class="w-12 h-16 bg-surface-container-low border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-white transition-all rounded-t-sm" maxlength="1" type="text" value="4"/>
<input class="w-12 h-16 bg-surface-container-low border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-white transition-all rounded-t-sm" maxlength="1" type="text" value="8"/>
<input class="w-12 h-16 bg-surface-container-low border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-white transition-all rounded-t-sm" maxlength="1" type="text" value="2"/>
<div class="w-4"></div> <!-- Spacer for chunking digits -->
<input class="w-12 h-16 bg-surface-container-low border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-white transition-all rounded-t-sm" maxlength="1" type="text"/>
<input class="w-12 h-16 bg-surface-container-low border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-white transition-all rounded-t-sm" maxlength="1" type="text"/>
<input class="w-12 h-16 bg-surface-container-low border-b-2 border-outline/20 text-center text-2xl font-mono text-primary focus:outline-none focus:border-primary focus:ring-0 focus:bg-white transition-all rounded-t-sm" maxlength="1" type="text"/>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-[#EB5E28] text-white font-josefin font-semibold text-lg rounded-lg glow-brand hover:bg-[#D44D1D] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 shadow-lg">
                    Verify
                </button>
<!-- Help Link -->
<div class="mt-6">
<button class="text-secondary hover:text-primary font-josefin text-xs tracking-wider uppercase transition-colors">
                        Resend Code
                    </button>
</div>
</div>
<!-- Footer Meta -->
<div class="bg-surface-container-low py-6 px-10 border-t border-outline/5 flex justify-center gap-8">
<a class="font-josefin text-[10px] uppercase tracking-[0.2em] text-outline hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="font-josefin text-[10px] uppercase tracking-[0.2em] text-outline hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</div>
</div>
<!-- Decorative Elements (Monolithic Accents) -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#EB5E28] to-transparent opacity-30 z-20"></div>
<div class="fixed bottom-0 left-0 w-full h-px bg-outline/10 z-20"></div>
</body></html>
